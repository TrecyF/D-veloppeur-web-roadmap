<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Trecy Fravallo</title>
    <style>
        body { 
            background-color: #008ba3; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            width: 90%; 
            max-width: 450px; 
            border-top: 12px solid #2c3e50; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        h1 { color: #2c3e50; margin-top: 0; text-transform: uppercase; font-size: 1.5rem; }
        .sub { color: #008ba3; font-weight: bold; margin-bottom: 25px; font-size: 0.9rem; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 15px; padding-left: 25px; position: relative; color: #2c3e50; line-height: 1.4; }
        li::before { content: '■'; position: absolute; left: 0; color: #ddd; }
        li.active::before { color: #008ba3; }
        .tag { font-size: 0.7rem; background: #eee; padding: 2px 5px; margin-left: 10px; color: #666; }
        .goal { margin-top: 25px; padding: 15px; background: #f4f4f4; border-left: 4px solid #008ba3; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Trecy Fravallo</h1>
        <p class="sub">PARCOURS D'APPRENTISSAGE WEB : SUIVI DE PROGRESSION</p>
        <ul>
            <li class="active">Bases du HTML5 & Structure <span class="tag">EN COURS</span></li>
            <li class="active">Stylisation CSS3 & Mise en page <span class="tag">EN COURS</span></li>
            <li>Immersion en milieu professionnel (PMSMP)</li>
            <li>Phase de renforcement technique : PHP & Java</li>
        </ul>
        <div class="goal">
            🎯 OBJECTIF : Développeur Web et Web Mobile (2026)
        </div>
    </div>
</body>
</html>
