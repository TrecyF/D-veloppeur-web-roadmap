<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Web - Trecy Fravallo</title>
    <style>
        :root {
            /* Couleurs inspirées de ton CV */
            --cv-blue: #008ba3; /* Le bleu pétrole du fond de ton CV */
            --cv-dark: #2c3e50; /* Couleur des textes principaux */
            --cv-grey: #7f8c8d; /* Couleur des textes secondaires */
            --accent-green: #27ae60; /* Pour le badge de succès */
            --learning-orange: #f39c12; /* Pour l'animation "en cours" */
        }
        
        body { 
            background-color: var(--cv-blue); /* Fond identique au CV */
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 4px; /* Bordures légèrement moins arrondies pour un look pro */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            max-width: 480px; 
            width: 100%; 
            border-left: 8px solid var(--cv-dark); /* Rappel des blocs sombres du CV */
        }

        .status-badge { 
            background: #e8f6ef; 
            color: var(--accent-green); 
            font-size: 0.75rem; 
            font-weight: bold; 
            padding: 4px 12px; 
            border-radius: 2px; 
            display: inline-block; 
            margin-bottom: 1rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--accent-green);
        }

        h1 { 
            color: var(--cv-dark); 
            font-size: 1.5rem; 
            margin: 0; 
            text-transform: uppercase; /* Style comme tes titres de rubriques CV */
            letter-spacing: 1px;
        }

        .subtitle { 
            color: var(--cv-grey); 
            font-size: 0.9rem; 
            margin-bottom: 2rem; 
            line-height: 1.4;
            font-style: italic;
        }

        ul { list-style: none; padding: 0; }
        li { 
            margin-bottom: 20px; 
            padding-left: 35px; 
            position: relative; 
            color: var(--cv-dark); 
            line-height: 1.5;
            font-weight: 500;
        }
        
        /* Puces de progression personnalisées */
        li::before { 
            content: ''; 
            position: absolute; 
            left: 0; 
            top: 4px; 
            width: 14px; 
            height: 14px; 
            border: 2px solid #bdc3c7; 
        }

        li.learning::before { 
            background: var(--learning-orange); 
            border-color: var(--learning-orange); 
            animation: pulse 2s infinite; 
        }

        li.todo::before { background: transparent; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .tag { 
            font-size: 0.65rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            padding: 2px 6px; 
            border-radius: 3px; 
            margin-left: 10px; 
            vertical-align: middle; 
            background: #eee;
            color: #666;
        }
